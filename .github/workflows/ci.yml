name: CI
on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  orchestrator:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orchestrator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: orchestrator/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test

  hooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats and shellcheck
        run: sudo apt-get update && sudo apt-get install -y bats shellcheck
      - name: shellcheck
        run: shellcheck hooks/scripts/*.sh
      - name: bats
        run: bats -r hooks/tests
